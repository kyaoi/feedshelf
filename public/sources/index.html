<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FeedShelf / Sources</title>
    <meta
      name="description"
      content="FeedShelf の媒体別一覧ページ。public/data/*.json を読み込み、指定媒体の記事だけを表示します。"
    />
    <link rel="stylesheet" href="../assets/styles.css" />
    <script defer src="../assets/app.js"></script>
  </head>
  <body>
    <header class="hero hero--compact">
      <div class="container hero__inner">
        <a class="back-link" href="../">← トップへ戻る</a>
        <p class="eyebrow">FeedShelf / Source</p>
        <h1 id="source-page-title">媒体を選択してください</h1>
        <p id="source-page-description" class="lead">
          トップページまたは媒体一覧から対象媒体を選ぶと、該当記事だけを表示します。
        </p>
      </div>
    </header>

    <main class="container layout">
      <section class="panel" aria-labelledby="source-nav-title">
        <div class="panel__heading">
          <div>
            <p class="panel__eyebrow">媒体</p>
            <h2 id="source-nav-title">媒体一覧</h2>
          </div>
          <p id="generated-at" class="muted">読み込み中…</p>
        </div>
        <div id="source-nav" class="chip-list" aria-live="polite">
          <p class="placeholder-text">読み込み中…</p>
        </div>
      </section>

      <section class="panel" aria-labelledby="articles-title">
        <div class="panel__heading">
          <div>
            <p class="panel__eyebrow">記事</p>
            <h2 id="articles-title">媒体別の記事一覧</h2>
          </div>
          <p id="articles-count" class="muted">読み込み中…</p>
        </div>

        <div id="articles-status" class="status status--loading" aria-live="polite">
          公開 JSON を読み込んでいます…
        </div>
        <ol id="articles-list" class="article-list" hidden></ol>
      </section>
    </main>
  </body>
</html>
